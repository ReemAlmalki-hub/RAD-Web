{% extends "base.html" %}

{% block content %}

<div class="card shadow">

    <div class="card-body">

        <h2 class="mb-4">
            Expand Excel File
        </h2>

        <p class="text-muted">
            Upload a RAD Excel file to automatically expand all routes.
        </p>

        <form method="POST" enctype="multipart/form-data">

            <!-- RAD Excel File -->
            <div class="mb-4">
                <label class="form-label">
                    Excel File
                </label>

                <input
                    type="file"
                    class="form-control"
                    name="excel_file"
                    accept=".xlsx"
                    required>
            </div>

            <!-- Validation File -->
            <div class="mb-4">
                <label class="form-label">
                    Validation File (Optional)
                </label>

                <input
                    type="file"
                    class="form-control"
                    name="validation_file"
                    accept=".xlsx">

                <div class="form-text">
                    Upload an Excel file containing valid waypoint names in one column.
                </div>
            </div>

            <!-- Submit Button -->
            <div class="text-center">
                <button
                    type="submit"
                    class="btn btn-expand-excel btn-lg">
                    Expand Excel File
                </button>
            </div>

        </form>

    </div>

</div>

{% endblock %}
