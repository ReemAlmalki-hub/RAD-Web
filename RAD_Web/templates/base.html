<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>RAD Route Expander</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<!-- ==========================
     Header
========================== -->

<header class="header">

    <div class="container">

        <div class="row align-items-center">

            <div class="col-md-4">

                <img
                    src="{{ url_for('static', filename='images/sans_logo.png') }}"
                    class="logo"
                    alt="SANS">

            </div>

            <div class="col-md-8 text-center">

                <h1 class="main-title">

                   

                </h1>


            </div>

        </div>

    </div>

</header>


<!-- ==========================
     Navigation
========================== -->

{% if request.path != '/' %}
<nav class="navbar navbar-expand-lg">

    <div class="container">

        <div class="navbar-nav mx-auto justify-content-center">

            <a class="nav-link mx-5" href="/">Home</a>

            <a class="nav-link mx-5" href="/expand">Expand Route</a>

            <a class="nav-link mx-5" href="/search">Search RAD</a>

            <a class="nav-link mx-5" href="/expand_excel">Expand Excel File</a>

        </div>

    </div>

</nav>
{% endif %}


<!-- ==========================
     Page Content
========================== -->

<div class="container mt-4">

    {% block content %}
    {% endblock %}

</div>

</body>

</html>
